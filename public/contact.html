<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Personal Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">My Personal Website</a>
        <div>
            <a class="nav-link d-inline text-white" href="/">Home</a>
            <a class="nav-link d-inline text-white" href="about.html">About</a>
            <a class="nav-link d-inline text-white" href="contact.html">Contact</a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Contact Me</h2>

        <p class="text-center">
            Fill in the form below to send me a message.
        </p>

        <form id="contactForm">
            <div class="mb-3">
                <input type="text" class="form-control" name="name" placeholder="Full Name" required>
            </div>

            <div class="mb-3">
                <input type="email" class="form-control" name="email" placeholder="Email Address" required>
            </div>

            <div class="mb-3">
                <textarea class="form-control" name="message" rows="4" placeholder="Your Message" required></textarea>
            </div>

            <button class="btn btn-dark w-100">Submit</button>
        </form>
    </div>
</div>

<footer class="bg-dark text-white text-center p-3">
    © 2026 Personal Website
</footer>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB1UWPaLJ8BMFJFBDkB4m2yEWYr5OFqiv8",
    authDomain: "daphine-project-aaa56.firebaseapp.com",
    projectId: "daphine-project-aaa56",
    storageBucket: "daphine-project-aaa56.firebasestorage.app",
    messagingSenderId: "120573587264",
    appId: "1:120573587264:web:08ba7228c3ac1a3e5954a5"
  };

  const app = initializeApp(firebaseConfig);

  console.log("Firebase connected");
</script>
<script>
document.getElementById("contactForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.querySelector("[name='name']").value;
    const email = document.querySelector("[name='email']").value;
    const message = document.querySelector("[name='message']").value;

    try {
        const res = await fetch("https://daph-webapp-coursewok-11.onrender.com/contact", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name, email, message })
        });

        const data = await res.json();

        if (data.success) {
            alert("Message sent successfully!");
            document.getElementById("contactForm").reset();
        } else {
            alert("Failed to send message");
        }

    } catch (err) {
        console.error(err);
        alert("Server error");
    }
});
</script>
</body>
</html>
